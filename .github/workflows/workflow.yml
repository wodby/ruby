name: Build docker image

on:
  push:
    branches:
      - master

    tags:
      - '*'

  pull_request:

env:
  RUBY40: '4.0.3'
  RUBY34: '3.4.9'
  RUBY33: '3.3.11'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      ruby-versions: ${{ steps.set-matrix.outputs.ruby-versions }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > versions.json
          [
            {"key": "ruby40", "version": "${{ env.RUBY40 }}", "workdir": ".", "latest": "latest", "latest_major": "latest-major"},
            {"key": "ruby34", "version": "${{ env.RUBY34 }}", "workdir": ".", "latest": "", "latest_major": "latest-major"},
            {"key": "ruby33", "version": "${{ env.RUBY33 }}", "workdir": ".", "latest": "", "latest_major": ""}
          ]
          EOF
          echo "ruby-versions=$(jq -c . versions.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      matrix:
        ruby: ${{ fromJson(needs.setup.outputs.ruby-versions) }}
        arch:
          - amd64
          - arm64
        dev:
          - ''
          - 'dev'
        user_id:
          - 1000
          - 501
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
          - user_id: 501
            group_id: 20
            dev: dev
        exclude:
          - dev: ''
            user_id: 501
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push
        env:
          RUBY_VER: ${{ matrix.ruby.version }}
          ARCH: ${{ matrix.arch }}
          RUBY_DEV: ${{ matrix.dev }}
          WODBY_USER_ID: ${{ matrix.user_id }}
          WODBY_GROUP_ID: ${{ matrix.group_id }}
        run: |
          make
          make test
          make push

  push:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
    strategy:
      matrix:
        ruby: ${{ fromJson(needs.setup.outputs.ruby-versions) }}
        dev:
          - ''
          - 'dev'
        user_id:
          - 1000
          - 501
        exclude:
          - dev: ''
            user_id: 501
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ./.github/actions
        with:
          version: ${{ matrix.ruby.version }}
          dev: ${{ matrix.dev }}
          user_id: ${{ matrix.user_id }}
          latest: ${{ matrix.ruby.latest }}
          latest_major: ${{ matrix.ruby.latest_major }}
